<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>信阅签 · 管理后台</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif;background:#f0f2f5;display:flex;min-height:100vh}
.sidebar{width:220px;background:#1a1a2e;color:#fff;position:fixed;top:0;left:0;bottom:0;overflow-y:auto;z-index:10}
.sidebar-logo{padding:20px;font-size:18px;font-weight:700;border-bottom:1px solid rgba(255,255,255,.1);text-align:center}
.sidebar-nav{padding:10px 0}
.nav-item{display:flex;align-items:center;padding:12px 20px;cursor:pointer;color:rgba(255,255,255,.7);font-size:14px;transition:.2s;user-select:none}
.nav-item:hover,.nav-item.active{background:rgba(255,255,255,.08);color:#fff}
.nav-item.active{border-left:3px solid #4361ee;font-weight:600}
.nav-item .icon{margin-right:10px;font-size:16px}
.main{margin-left:220px;flex:1;padding:24px}
/* 登录遮罩 */
.login-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:#f0f2f5;display:flex;align-items:center;justify-content:center;z-index:9999}
.login-box{background:#fff;border-radius:16px;padding:40px;width:360px;box-shadow:0 4px 20px rgba(0,0,0,0.08);text-align:center}
.login-box h2{font-size:22px;color:#1a1a2e;margin-bottom:8px}
.login-box .sub{font-size:13px;color:#94a3b8;margin-bottom:24px}
.login-box input{width:100%;padding:12px 16px;border:1px solid #e2e8f0;border-radius:10px;font-size:14px;margin-bottom:12px;outline:none}
.login-box input:focus{border-color:#4361ee}
.login-box button{width:100%;padding:12px;background:#4361ee;color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px}
.login-box .err{color:#ef4444;font-size:13px;margin-top:8px}
.card{background:#fff;border-radius:12px;padding:20px;margin-bottom:16px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.card h2{font-size:18px;margin-bottom:16px;color:#1a1a2e}
.search-row{display:flex;gap:10px;margin-bottom:16px;align-items:center}
.search-input{padding:8px 12px;border:1px solid #d1d5db;border-radius:8px;font-size:13px;width:250px}
.search-btn{padding:8px 16px;border:none;border-radius:8px;background:#4361ee;color:#fff;font-size:13px;cursor:pointer}
table{width:100%;border-collapse:collapse}
th,td{padding:10px 8px;text-align:left;border-bottom:1px solid #f0f2f5;font-size:13px}
th{color:#666;font-weight:600;font-size:12px}
.btn{padding:6px 14px;border-radius:6px;border:none;cursor:pointer;font-size:12px;font-weight:500;transition:.2s;margin-right:4px}
.btn-primary{background:#4361ee;color:#fff}
.btn-danger{background:#ef4444;color:#fff}
.btn-success{background:#10b981;color:#fff}
.btn-warning{background:#f59e0b;color:#fff}
.btn-secondary{background:#e5e7eb;color:#333}
.btn-sm{padding:4px 10px;font-size:11px}
.badge{display:inline-block;padding:3px 10px;border-radius:12px;font-size:11px;font-weight:600}
.badge-success{background:#d1fae5;color:#065f46}
.badge-warning{background:#fef3c7;color:#92400e}
.badge-danger{background:#fee2e2;color:#991b1b}
.badge-info{background:#dbeafe;color:#1e40af}
.input-field{padding:8px 12px;border:1px solid #d1d5db;border-radius:8px;font-size:13px;width:200px;margin-right:8px}
.row{display:flex;gap:12px;margin-bottom:16px;align-items:center;flex-wrap:wrap}
.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);z-index:1000;justify-content:center;align-items:center}
.modal.active{display:flex}
.modal-content{background:#fff;border-radius:16px;padding:24px;max-width:600px;width:90%;max-height:80vh;overflow-y:auto}
.close-btn{float:right;background:none;border:none;font-size:20px;cursor:pointer}
.toast{position:fixed;top:20px;right:20px;padding:12px 20px;border-radius:8px;color:#fff;font-size:14px;z-index:9999;display:none}
.toast-success{background:#10b981}
.toast-error{background:#ef4444}
.id-card-img{max-width:200px;max-height:150px;margin:4px;border-radius:8px;border:1px solid #e5e7eb;cursor:pointer}
.full-img{width:100%;max-height:70vh;object-fit:contain;border-radius:8px}
.logout-btn{position:fixed;top:16px;right:24px;font-size:12px;color:#94a3b8;cursor:pointer;z-index:999}
</style>
</head>
<body>
<!-- 登录遮罩 -->
<div id="loginOverlay" class="login-overlay">
  <div class="login-box">
    <h2>信阅签 后台</h2>
    <div class="sub">请输入账号密码登录</div>
    <input type="text" id="loginUsername" placeholder="账号" autocomplete="off">
    <input type="password" id="loginPassword" placeholder="密码">
    <button onclick="doLogin()">登 录</button>
    <div class="err" id="loginErr"></div>
  </div>
</div>

<div class="sidebar" id="sidebar">
  <div class="sidebar-logo">📋 信阅签 后台</div>
  <div class="sidebar-nav" id="sidebarNav"></div>
</div>

<div class="main" id="mainContent"></div>
<div class="modal" id="modal"><div class="modal-content" id="modalContent"></div></div>
<div id="toast" class="toast"></div>
<div class="logout-btn" onclick="doLogout()" style="display:none">退出登录</div>

<script>
const API = 'https://seven47917687-qq-com.onrender.com';
let currentPage = 'realname';
let adminToken = '';
let adminRole = '';

// 初始化侧边栏
function initSidebar() {
  let menuHtml = '';
  menuHtml += '<div class="nav-item active" data-page="realname"><span class="icon">🪪</span>实名审核</div>';
  if (adminRole === 'admin') {
    menuHtml += '<div class="nav-item" data-page="contracts"><span class="icon">📄</span>合同管理</div>';
    menuHtml += '<div class="nav-item" data-page="auth"><span class="icon">🔑</span>授权管理</div>';
    menuHtml += '<div class="nav-item" data-page="adminAccounts"><span class="icon">⚙️</span>账号管理</div>';
  }
  document.getElementById('sidebarNav').innerHTML = menuHtml;
  document.querySelectorAll('.nav-item').forEach(item => {
    item.addEventListener('click', function() {
      document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
      this.classList.add('active'); currentPage = this.dataset.page; renderPage();
    });
  });
}

// 登录
function doLogin() {
  const username = document.getElementById('loginUsername').value.trim();
  const password = document.getElementById('loginPassword').value.trim();
  if (!username || !password) { document.getElementById('loginErr').textContent = '请输入账号和密码'; return; }
  fetch(API + '/api/admin/login', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ username, password })
  }).then(r => r.json()).then(data => {
    if (data.code === 200) {
      adminToken = data.token; adminRole = data.role;
      localStorage.setItem('adminToken', adminToken); localStorage.setItem('adminRole', adminRole);
      document.getElementById('loginOverlay').style.display = 'none';
      document.querySelector('.logout-btn').style.display = 'block';
      initSidebar(); renderPage();
    } else { document.getElementById('loginErr').textContent = data.message || '登录失败'; }
  }).catch(() => { document.getElementById('loginErr').textContent = '网络错误，请重试'; });
}

function doLogout() {
  localStorage.removeItem('adminToken'); localStorage.removeItem('adminRole');
  adminToken = ''; adminRole = '';
  document.getElementById('loginOverlay').style.display = 'flex';
  document.querySelector('.logout-btn').style.display = 'none';
  document.getElementById('mainContent').innerHTML = '';
}

// 自动登录
(function() {
  const savedToken = localStorage.getItem('adminToken');
  const savedRole = localStorage.getItem('adminRole');
  if (savedToken && savedRole) { adminToken = savedToken; adminRole = savedRole;
    document.getElementById('loginOverlay').style.display = 'none';
    document.querySelector('.logout-btn').style.display = 'block';
    initSidebar(); renderPage(); }
})();

function showToast(msg, type) { type = type || 'success'; const t = document.getElementById('toast'); t.textContent = msg; t.className = 'toast toast-' + type; t.style.display = 'block'; setTimeout(() => t.style.display = 'none', 2500); }
function openModal(title, html) { document.getElementById('modalContent').innerHTML = '<button class="close-btn" onclick="closeModal()">✕</button><h3>' + title + '</h3>' + html; document.getElementById('modal').classList.add('active'); }
function closeModal() { document.getElementById('modal').classList.remove('active'); }

async function apiGet(path) { const headers = {}; if (adminToken) headers['Authorization'] = 'Bearer ' + adminToken; const res = await fetch(API + path, { headers }); const data = await res.json(); if (data.code === 401) { doLogout(); } return data; }
async function apiPost(path, body) { const headers = { 'Content-Type': 'application/json' }; if (adminToken) headers['Authorization'] = 'Bearer ' + adminToken; const res = await fetch(API + path, { method: 'POST', headers, body: JSON.stringify(body) }); const data = await res.json(); if (data.code === 401) { doLogout(); } return data; }

async function renderPage() { const main = document.getElementById('mainContent'); if (currentPage === 'realname') await renderRealname(main); else if (currentPage === 'contracts') await renderContracts(main); else if (currentPage === 'auth') await renderAuth(main); else if (currentPage === 'adminAccounts') await renderAdminAccounts(main); }

// ========== 实名审核 ==========
async function renderRealname(main) {
  const data = await apiGet('/api/admin/realname');
  const allList = data.data || [];
  let blackList = [];
  try { const usersRes = await apiGet('/api/admin/users'); blackList = (usersRes.data || []).filter(u => u.blacked).map(u => u.openid); } catch(e) {}
  let html = '<div class="card"><h2>实名审核 (共' + allList.length + '条)</h2>';
  html += '<div class="search-row"><input class="search-input" id="realnameSearch" placeholder="搜索姓名或身份证号"><button class="search-btn" onclick="searchRealname()">搜索</button></div>';
  html += '<table id="realnameTable"><tr><th>ID</th><th>姓名</th><th>身份证号</th><th>状态</th><th>认证时间</th><th>证件</th><th>操作</th></tr></table></div>';
  if (adminRole === 'admin') html += '<div class="card" style="margin-top:16px"><h2>拉黑IP管理</h2><div class="row"><input type="text" class="input-field" id="ipInput" placeholder="输入IP地址"><button class="btn btn-danger" onclick="blackIp()">拉黑IP</button></div></div>';
  main.innerHTML = html; window.realnameData = allList; window.blackList = blackList; renderRealnameTable(allList);
}

function searchRealname() { const keyword = document.getElementById('realnameSearch').value.trim().toLowerCase(); const filtered = window.realnameData.filter(r => (r.realname || '').toLowerCase().includes(keyword) || (r.idcard || '').includes(keyword)); renderRealnameTable(filtered); }
function renderRealnameTable(list) { const blackList = window.blackList || []; let rows = ''; list.forEach(r => { const isBlacked = blackList.includes(r.openid); rows += '<tr><td>' + r.id + '</td><td>' + (r.realname || '-') + '</td><td>' + (r.idcard || '-') + '</td>'; rows += '<td><span class="badge ' + (r.status === 'approved' ? 'badge-success' : 'badge-warning') + '">' + (r.status === 'approved' ? '已通过' : '待审核') + '</span></td>'; rows += '<td>' + (r.time || '-') + '</td>'; rows += '<td><button class="btn btn-secondary btn-sm" onclick="loadAndViewIdCard(' + r.id + ')">查看证件</button></td>'; rows += '<td style="min-width:160px">'; if (adminRole === 'admin') { rows += '<button class="btn btn-danger btn-sm" onclick="deleteUserByOpenid(\'' + r.openid + '\')">删除</button> '; rows += isBlacked ? '<button class="btn btn-success btn-sm" onclick="unblackAccount(\'' + r.openid + '\')">解除拉黑</button>' : '<button class="btn btn-warning btn-sm" onclick="blackAccount(\'' + r.openid + '\')">拉黑账号</button>'; } else { rows += '-'; } rows += '</td></tr>'; }); document.getElementById('realnameTable').innerHTML = '<tr><th>ID</th><th>姓名</th><th>身份证号</th><th>状态</th><th>认证时间</th><th>证件</th><th>操作</th></tr>' + rows; }

async function loadAndViewIdCard(id) {
  openModal('身份证件', '<p style="text-align:center;color:#94a3b8">加载中...</p>');
  const headers = adminToken ? { 'Authorization': 'Bearer ' + adminToken } : {};
  const res = await fetch(API + '/api/admin/realname/images?id=' + id, { headers }).then(r => r.json());
  if (res.code === 200) {
    const d = res.data;
    let html = '<div style="display:flex;gap:10px;flex-wrap:wrap;justify-content:center">';
    html += '<div style="text-align:center"><p style="margin-bottom:6px;font-weight:600">身份证正面</p>';
    if (d.frontImg) { const isBase64 = d.frontImg.startsWith('data:image/'); const src = isBase64 ? d.frontImg : (API + d.frontImg); html += '<img src="' + src + '" class="id-card-img" onclick="showFullImage(\'' + src + '\')" title="点击查看原图">'; html += '<p style="font-size:11px;color:#94a3b8;margin-top:4px">点击图片查看原图</p>'; } else { html += '<p style="color:#999">未上传</p>'; } html += '</div>';
    html += '<div style="text-align:center"><p style="margin-bottom:6px;font-weight:600">身份证反面</p>';
    if (d.backImg) { const isBase64 = d.backImg.startsWith('data:image/'); const src = isBase64 ? d.backImg : (API + d.backImg); html += '<img src="' + src + '" class="id-card-img" onclick="showFullImage(\'' + src + '\')" title="点击查看原图">'; html += '<p style="font-size:11px;color:#94a3b8;margin-top:4px">点击图片查看原图</p>'; } else { html += '<p style="color:#999">未上传</p>'; } html += '</div>';
    html += '</div>'; document.getElementById('modalContent').innerHTML = '<button class="close-btn" onclick="closeModal()">✕</button><h3>身份证件</h3>' + html; } }

function showFullImage(src) { document.getElementById('modalContent').innerHTML = '<button class="close-btn" onclick="closeModal()">✕</button><h3>查看原图</h3><img src="' + src + '" class="full-img">'; }

async function deleteUserByOpenid(openid) { if (!confirm('确定删除该用户所有信息吗？此操作不可恢复！')) return; const res = await apiPost('/api/admin/user/delete', { openid }); showToast(res.code === 200 ? '已删除' : (res.message || '失败'), res.code === 200 ? 'success' : 'error'); if (res.code === 200) renderPage(); }
async function blackAccount(openid) { if (!confirm('确定拉黑该账号吗？拉黑后将无法登录。')) return; const res = await apiPost('/api/admin/black/account', { openid }); showToast(res.code === 200 ? '已拉黑' : '失败', res.code === 200 ? 'success' : 'error'); if (res.code === 200) renderPage(); }
async function unblackAccount(openid) { if (!confirm('确定解除拉黑吗？')) return; const res = await apiPost('/api/admin/black/unaccount', { openid }); showToast(res.code === 200 ? '已解除' : '失败', res.code === 200 ? 'success' : 'error'); if (res.code === 200) renderPage(); }
async function blackIp() { const ip = document.getElementById('ipInput').value.trim(); if (!ip) return showToast('请输入IP', 'error'); if (!confirm('确定拉黑该IP吗？')) return; const res = await apiPost('/api/admin/black/ip', { ip }); showToast(res.code === 200 ? 'IP已拉黑' : '失败', res.code === 200 ? 'success' : 'error'); }

// ========== 合同管理 ==========
async function renderContracts(main) { const data = await apiGet('/api/admin/contracts'); const allList = data.data || []; let html = '<div class="card"><h2>合同管理 (共' + allList.length + '条)</h2>'; html += '<div class="search-row"><input class="search-input" id="contractSearch" placeholder="搜索出借人或借款人姓名"><button class="search-btn" onclick="searchContracts()">搜索</button></div>'; html += '<table id="contractTable"><tr><th>ID</th><th>出借人</th><th>借款人</th><th>金额</th><th>状态</th><th>借款日期</th><th>操作</th></tr></table></div>'; main.innerHTML = html; window.contractData = allList; renderContractTable(allList); }
function searchContracts() { const keyword = document.getElementById('contractSearch').value.trim().toLowerCase(); const filtered = window.contractData.filter(c => (c.lendername || '').toLowerCase().includes(keyword) || (c.borrowername || '').toLowerCase().includes(keyword)); renderContractTable(filtered); }
function renderContractTable(list) { let rows = ''; list.forEach(c => { rows += '<tr><td>' + c.id + '</td><td>' + (c.lendername || '-') + '</td><td>' + (c.borrowername || '-') + '</td><td>¥' + c.amount + '</td><td>' + c.status + '</td><td>' + c.startdate + ' ~ ' + c.enddate + '</td>'; rows += '<td>'; if (c.status === 'active') { rows += '<button class="btn btn-warning btn-sm" onclick="adminExtend(' + c.id + ')">延期</button> '; rows += '<button class="btn btn-success btn-sm" onclick="adminClose(' + c.id + ')">结清</button>'; } else { rows += '-'; } rows += '</td></tr>'; }); document.getElementById('contractTable').innerHTML = '<tr><th>ID</th><th>出借人</th><th>借款人</th><th>金额</th><th>状态</th><th>借款日期</th><th>操作</th></tr>' + rows; }
async function adminExtend(contractId) { const newEndDate = prompt('请输入新的截止日期（格式：2026-06-15）：'); if (!newEndDate) return; const reason = prompt('请输入延期原因（选填）：') || '后台手动延期'; const res = await apiPost('/api/loan/contract/extend', { contractId, newEndDate, reason }); if (res.code === 200) { showToast('延期成功'); renderPage(); } else { showToast('延期失败: ' + (res.message || ''), 'error'); } }
async function adminClose(contractId) { if (!confirm('确定结清此合同吗？')) return; const res = await apiPost('/api/loan/contract/close', { contractId }); if (res.code === 200) { showToast('已结清'); renderPage(); } else { showToast('结清失败: ' + (res.message || ''), 'error'); } }

// ========== 授权管理 ==========
async function renderAuth(main) { const data = await apiGet('/api/admin/auth/list'); const list = data.data || []; let html = '<div class="card"><h2>授权管理</h2>'; html += '<div class="row"><input type="text" class="input-field" id="authNameInput" placeholder="真实姓名"><input type="text" class="input-field" id="authIdCardInput" placeholder="身份证号"><button class="btn btn-primary" onclick="addAuth()">添加授权</button></div>'; html += '<table><tr><th>序号</th><th>姓名</th><th>身份证号</th><th>操作</th></tr>'; list.forEach((item, i) => { html += '<tr><td>' + (i + 1) + '</td><td>' + item.realname + '</td><td>' + item.idcard + '</td><td><button class="btn btn-danger btn-sm" onclick="removeAuth(\'' + item.realname + '\',\'' + item.idcard + '\')">取消授权</button></td></tr>'; }); html += '</table></div>'; main.innerHTML = html; }
async function addAuth() { const realName = document.getElementById('authNameInput').value.trim(); const idCard = document.getElementById('authIdCardInput').value.trim(); if (!realName || !idCard) return showToast('请填写姓名和身份证号', 'error'); const res = await apiPost('/api/admin/auth/add', { realName, idCard }); showToast(res.code === 200 ? '授权成功' : (res.message || '失败'), res.code === 200 ? 'success' : 'error'); if (res.code === 200) renderPage(); }
async function removeAuth(realName, idCard) { const res = await apiPost('/api/admin/auth/remove', { realName, idCard }); showToast(res.code === 200 ? '已取消' : '失败', res.code === 200 ? 'success' : 'error'); if (res.code === 200) renderPage(); }

// ========== 后台账号管理 ==========
async function renderAdminAccounts(main) {
  const data = await apiGet('/api/admin/accounts');
  const list = data.data || [];
  let html = '<div class="card"><h2>后台账号管理 (共' + list.length + '条)</h2>';
  html += '<table><tr><th>用户名</th><th>角色</th><th>操作</th></tr>';
  list.forEach(a => { html += '<tr><td>' + a.username + '</td><td>' + (a.role === 'admin' ? '老板' : '员工') + '</td><td><button class="btn btn-warning btn-sm" onclick="changeAdminUsername(\'' + a.username + '\')">修改账号</button> <button class="btn btn-warning btn-sm" onclick="changePassword(\'' + a.username + '\')">修改密码</button> ' + (a.role !== 'admin' ? '<button class="btn btn-danger btn-sm" onclick="deleteAdminAccount(\'' + a.username + '\')">删除</button>' : '') + '</td></tr>'; });
  html += '</table></div>'; main.innerHTML = html;
}

async function changeAdminUsername(username) { openModal('修改账号 - ' + username, '<input type="text" id="newUsername" class="input-field" placeholder="新用户名"><br><button class="btn btn-primary" onclick="submitChangeUsername(\'' + username + '\')">确定修改</button>'); }
async function submitChangeUsername(username) { const newUsername = document.getElementById('newUsername').value.trim(); if (!newUsername) return showToast('请输入新用户名', 'error'); const res = await apiPost('/api/admin/change-username', { username, newUsername }); showToast(res.code === 200 ? '用户名已修改' : (res.message || '修改失败'), res.code === 200 ? 'success' : 'error'); if (res.code === 200) { closeModal(); renderPage(); } }

async function changePassword(username) { openModal('修改密码 - ' + username, '<input type="password" id="oldPass" class="input-field" placeholder="旧密码"><br><input type="password" id="newPass" class="input-field" placeholder="新密码"><br><button class="btn btn-primary" onclick="submitChangePassword(\'' + username + '\')">确定修改</button>'); }
async function submitChangePassword(username) { const oldPass = document.getElementById('oldPass').value; const newPass = document.getElementById('newPass').value; if (!oldPass || !newPass) return showToast('请填写完整', 'error'); const res = await apiPost('/api/admin/change-password', { username, oldPassword: oldPass, newPassword: newPass }); showToast(res.code === 200 ? '密码已修改' : (res.message || '修改失败'), res.code === 200 ? 'success' : 'error'); if (res.code === 200) { closeModal(); renderPage(); } }
async function deleteAdminAccount(username) { if (!confirm('确定删除后台账号 ' + username + ' 吗？此操作不可恢复。')) return; const res = await apiPost('/api/admin/delete-account', { username }); showToast(res.code === 200 ? '已删除' : (res.message || '删除失败'), res.code === 200 ? 'success' : 'error'); if (res.code === 200) renderPage(); }
</script>
</body>
</html>
