<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>信阅签 · 管理后台</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif;background:#f0f2f5;display:flex;min-height:100vh}
.sidebar{width:220px;background:#1a1a2e;color:#fff;position:fixed;top:0;left:0;bottom:0;overflow-y:auto;z-index:10}
.sidebar-logo{padding:20px;font-size:18px;font-weight:700;border-bottom:1px solid rgba(255,255,255,.1);text-align:center}
.sidebar-nav{padding:10px 0}
.nav-item{display:flex;align-items:center;padding:12px 20px;cursor:pointer;color:rgba(255,255,255,.7);font-size:14px;transition:.2s;user-select:none}
.nav-item:hover,.nav-item.active{background:rgba(255,255,255,.08);color:#fff}
.nav-item.active{border-left:3px solid #4361ee;font-weight:600}
.nav-item .icon{margin-right:10px;font-size:16px}
.main{margin-left:220px;flex:1;padding:24px}
.card{background:#fff;border-radius:12px;padding:20px;margin-bottom:16px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.card h2{font-size:18px;margin-bottom:16px;color:#1a1a2e}
.search-row{display:flex;gap:10px;margin-bottom:16px;align-items:center}
.search-input{padding:8px 12px;border:1px solid #d1d5db;border-radius:8px;font-size:13px;width:250px}
.search-btn{padding:8px 16px;border:none;border-radius:8px;background:#4361ee;color:#fff;font-size:13px;cursor:pointer}
table{width:100%;border-collapse:collapse}
th,td{padding:10px 8px;text-align:left;border-bottom:1px solid #f0f2f5;font-size:13px}
th{color:#666;font-weight:600;font-size:12px}
.btn{padding:6px 14px;border-radius:6px;border:none;cursor:pointer;font-size:12px;font-weight:500;transition:.2s;margin-right:4px}
.btn-primary{background:#4361ee;color:#fff}
.btn-danger{background:#ef4444;color:#fff}
.btn-success{background:#10b981;color:#fff}
.btn-warning{background:#f59e0b;color:#fff}
.btn-secondary{background:#e5e7eb;color:#333}
.btn-sm{padding:4px 10px;font-size:11px}
.badge{display:inline-block;padding:3px 10px;border-radius:12px;font-size:11px;font-weight:600}
.badge-success{background:#d1fae5;color:#065f46}
.badge-warning{background:#fef3c7;color:#92400e}
.badge-danger{background:#fee2e2;color:#991b1b}
.badge-info{background:#dbeafe;color:#1e40af}
.input-field{padding:8px 12px;border:1px solid #d1d5db;border-radius:8px;font-size:13px;width:200px;margin-right:8px}
.row{display:flex;gap:12px;margin-bottom:16px;align-items:center;flex-wrap:wrap}
.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);z-index:1000;justify-content:center;align-items:center}
.modal.active{display:flex}
.modal-content{background:#fff;border-radius:16px;padding:24px;max-width:600px;width:90%;max-height:80vh;overflow-y:auto}
.close-btn{float:right;background:none;border:none;font-size:20px;cursor:pointer}
.toast{position:fixed;top:20px;right:20px;padding:12px 20px;border-radius:8px;color:#fff;font-size:14px;z-index:9999;display:none}
.toast-success{background:#10b981}
.toast-error{background:#ef4444}
.id-card-img{max-width:200px;max-height:150px;margin:4px;border-radius:8px;border:1px solid #e5e7eb}
</style>
</head>
<body>

<div class="sidebar">
  <div class="sidebar-logo">📋 信阅签 后台</div>
  <div class="sidebar-nav">
    <div class="nav-item active" data-page="realname"><span class="icon">🪪</span>实名审核</div>
    <div class="nav-item" data-page="contracts"><span class="icon">📄</span>合同管理</div>
    <div class="nav-item" data-page="auth"><span class="icon">🔑</span>授权管理</div>
    <div class="nav-item" data-page="accounts"><span class="icon">👥</span>账号管理</div>
  </div>
</div>

<div class="main" id="mainContent"></div>
<div class="modal" id="modal"><div class="modal-content" id="modalContent"></div></div>
<div id="toast" class="toast"></div>

<script>
const API = 'https://seven47917687-qq-com.onrender.com';
let currentPage = 'realname';

document.querySelectorAll('.nav-item').forEach(item => {
  item.addEventListener('click', function() {
    document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
    this.classList.add('active');
    currentPage = this.dataset.page;
    renderPage();
  });
});

function showToast(msg, type) {
  type = type || 'success';
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast toast-' + type;
  t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', 2500);
}

function openModal(title, html) {
  document.getElementById('modalContent').innerHTML = '<button class="close-btn" onclick="closeModal()">✕</button><h3>' + title + '</h3>' + html;
  document.getElementById('modal').classList.add('active');
}
function closeModal() { document.getElementById('modal').classList.remove('active'); }

async function apiGet(path) {
  const res = await fetch(API + path);
  return await res.json();
}
async function apiPost(path, body) {
  const res = await fetch(API + path, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });
  return await res.json();
}

async function renderPage() {
  const main = document.getElementById('mainContent');
  if (currentPage === 'realname') await renderRealname(main);
  else if (currentPage === 'contracts') await renderContracts(main);
  else if (currentPage === 'auth') await renderAuth(main);
  else if (currentPage === 'accounts') await renderAccounts(main);
}

// ========== 实名审核 ==========
async function renderRealname(main) {
  const data = await apiGet('/api/admin/realname');
  const allList = data.data || [];
  let html = '<div class="card"><h2>实名审核 (共' + allList.length + '条)</h2>';
  html += '<div class="search-row"><input class="search-input" id="realnameSearch" placeholder="搜索姓名或身份证号"><button class="search-btn" onclick="searchRealname()">搜索</button></div>';
  html += '<table id="realnameTable"><tr><th>ID</th><th>姓名</th><th>身份证号</th><th>状态</th><th>认证时间</th><th>证件</th></tr></table></div>';
  main.innerHTML = html;
  window.realnameData = allList;
  renderRealnameTable(allList);
}

function searchRealname() {
  const keyword = document.getElementById('realnameSearch').value.trim().toLowerCase();
  const filtered = window.realnameData.filter(r => 
    (r.realname || '').toLowerCase().includes(keyword) || (r.idcard || '').includes(keyword)
  );
  renderRealnameTable(filtered);
}

function renderRealnameTable(list) {
  let rows = '';
  list.forEach(r => {
    rows += '<tr><td>' + r.id + '</td><td>' + (r.realname || '-') + '</td><td>' + (r.idcard || '-') + '</td>';
    rows += '<td><span class="badge ' + (r.status === 'approved' ? 'badge-success' : 'badge-warning') + '">' + (r.status === 'approved' ? '已通过' : '待审核') + '</span></td>';
    rows += '<td>' + (r.time || '-') + '</td>';
    rows += '<td><button class="btn btn-secondary btn-sm" onclick="viewIdCard(\'' + (r.frontimg || '') + '\',\'' + (r.backimg || '') + '\')">查看证件</button></td></tr>';
  });
  document.getElementById('realnameTable').innerHTML = '<tr><th>ID</th><th>姓名</th><th>身份证号</th><th>状态</th><th>认证时间</th><th>证件</th></tr>' + rows;
}

function viewIdCard(front, back) {
  let html = '<div style="display:flex;gap:10px;flex-wrap:wrap">';
  if (front && front !== '') {
    html += '<div><p>身份证正面：</p><img src="' + front + '" class="id-card-img" onerror="this.style.display=\'none\'"></div>';
  } else {
    html += '<div><p>身份证正面：</p><p style="color:#999">未上传</p></div>';
  }
  if (back && back !== '') {
    html += '<div><p>身份证反面：</p><img src="' + back + '" class="id-card-img" onerror="this.style.display=\'none\'"></div>';
  } else {
    html += '<div><p>身份证反面：</p><p style="color:#999">未上传</p></div>';
  }
  html += '</div>';
  openModal('身份证件', html);
}

// ========== 合同管理 ==========
async function renderContracts(main) {
  const data = await apiGet('/api/admin/contracts');
  const allList = data.data || [];
  let html = '<div class="card"><h2>合同管理 (共' + allList.length + '条)</h2>';
  html += '<div class="search-row"><input class="search-input" id="contractSearch" placeholder="搜索出借人或借款人姓名"><button class="search-btn" onclick="searchContracts()">搜索</button></div>';
  html += '<table id="contractTable"><tr><th>ID</th><th>出借人</th><th>借款人</th><th>金额</th><th>状态</th><th>借款日期</th></tr></table></div>';
  main.innerHTML = html;
  window.contractData = allList;
  renderContractTable(allList);
}

function searchContracts() {
  const keyword = document.getElementById('contractSearch').value.trim().toLowerCase();
  const filtered = window.contractData.filter(c => 
    (c.lendername || '').toLowerCase().includes(keyword) || (c.borrowername || '').toLowerCase().includes(keyword)
  );
  renderContractTable(filtered);
}

function renderContractTable(list) {
  let rows = '';
  list.forEach(c => {
    rows += '<tr><td>' + c.id + '</td><td>' + (c.lendername || '-') + '</td><td>' + (c.borrowername || '-') + '</td><td>¥' + c.amount + '</td><td>' + c.status + '</td><td>' + c.startdate + ' ~ ' + c.enddate + '</td></tr>';
  });
  document.getElementById('contractTable').innerHTML = '<tr><th>ID</th><th>出借人</th><th>借款人</th><th>金额</th><th>状态</th><th>借款日期</th></tr>' + rows;
}

// ========== 授权管理 ==========
async function renderAuth(main) {
  const data = await apiGet('/api/admin/auth/list');
  const list = data.data || [];
  let html = '<div class="card"><h2>授权管理</h2>';
  html += '<div class="row"><input type="text" class="input-field" id="authNameInput" placeholder="真实姓名"><input type="text" class="input-field" id="authIdCardInput" placeholder="身份证号"><button class="btn btn-primary" onclick="addAuth()">添加授权</button></div>';
  html += '<table><tr><th>序号</th><th>姓名</th><th>身份证号</th><th>操作</th></tr>';
  list.forEach((item, i) => {
    html += '<tr><td>' + (i + 1) + '</td><td>' + item.realname + '</td><td>' + item.idcard + '</td><td><button class="btn btn-danger btn-sm" onclick="removeAuth(\'' + item.realname + '\',\'' + item.idcard + '\')">取消授权</button></td></tr>';
  });
  html += '</table></div>';
  main.innerHTML = html;
}

async function addAuth() {
  const realName = document.getElementById('authNameInput').value.trim();
  const idCard = document.getElementById('authIdCardInput').value.trim();
  if (!realName || !idCard) return showToast('请填写姓名和身份证号', 'error');
  const res = await apiPost('/api/admin/auth/add', { realName, idCard });
  showToast(res.code === 200 ? '授权成功' : (res.message || '失败'), res.code === 200 ? 'success' : 'error');
  if (res.code === 200) renderPage();
}

async function removeAuth(realName, idCard) {
  const res = await apiPost('/api/admin/auth/remove', { realName, idCard });
  showToast(res.code === 200 ? '已取消' : '失败', res.code === 200 ? 'success' : 'error');
  if (res.code === 200) renderPage();
}

// ========== 账号管理 ==========
async function renderAccounts(main) {
  const data = await apiGet('/api/admin/users');
  const allList = data.data || [];
  let html = '<div class="card"><h2>账号管理 (共' + allList.length + '条)</h2>';
  html += '<div class="search-row"><input class="search-input" id="accountSearch" placeholder="搜索姓名"><button class="search-btn" onclick="searchAccounts()">搜索</button></div>';
  html += '<table id="accountTable"><tr><th>OpenID</th><th>姓名</th><th>实名状态</th><th>认证时间</th><th>授权状态</th><th>拉黑</th><th>操作</th></tr></table></div>';
  html += '<div class="card"><h2>拉黑IP管理</h2><div class="row"><input type="text" class="input-field" id="ipInput" placeholder="输入IP地址"><button class="btn btn-danger" onclick="blackIp()">拉黑IP</button></div></div>';
  main.innerHTML = html;
  window.accountData = allList;
  renderAccountTable(allList);
}

function searchAccounts() {
  const keyword = document.getElementById('accountSearch').value.trim().toLowerCase();
  const filtered = window.accountData.filter(u => 
    (u.realName || '').toLowerCase().includes(keyword)
  );
  renderAccountTable(filtered);
}

function renderAccountTable(list) {
  let rows = '';
  list.forEach(u => {
    rows += '<tr><td>' + u.openid + '</td><td>' + (u.realName || '-') + '</td><td>' + (u.realStatus === 'verified' ? '已实名' : '未实名') + '</td>';
    rows += '<td>' + (u.realTime || '-') + '</td>';
    rows += '<td>' + (u.authorized ? '已授权' : '未授权') + '</td>';
    rows += '<td>' + (u.blacked ? '已拉黑' : '正常') + '</td>';
    rows += '<td>';
    rows += '<button class="btn btn-danger btn-sm" onclick="deleteUser(\'' + u.openid + '\')">删除</button> ';
    rows += u.blacked ? '<button class="btn btn-success btn-sm" onclick="unblackAccount(\'' + u.openid + '\')">解除拉黑</button>' : '<button class="btn btn-warning btn-sm" onclick="blackAccount(\'' + u.openid + '\')">拉黑账号</button>';
    rows += '</td></tr>';
  });
  document.getElementById('accountTable').innerHTML = '<tr><th>OpenID</th><th>姓名</th><th>实名状态</th><th>认证时间</th><th>授权状态</th><th>拉黑</th><th>操作</th></tr>' + rows;
}

async function deleteUser(openid) {
  if (!confirm('确定删除该用户所有信息吗？此操作不可恢复！')) return;
  const res = await apiPost('/api/admin/user/delete', { openid });
  showToast(res.code === 200 ? '已删除' : (res.message || '失败'), res.code === 200 ? 'success' : 'error');
  if (res.code === 200) renderPage();
}

async function blackAccount(openid) {
  const res = await apiPost('/api/admin/black/account', { openid });
  showToast(res.code === 200 ? '已拉黑' : '失败', res.code === 200 ? 'success' : 'error');
  if (res.code === 200) renderPage();
}

async function unblackAccount(openid) {
  const res = await apiPost('/api/admin/black/unaccount', { openid });
  showToast(res.code === 200 ? '已解除' : '失败', res.code === 200 ? 'success' : 'error');
  if (res.code === 200) renderPage();
}

async function blackIp() {
  const ip = document.getElementById('ipInput').value.trim();
  if (!ip) return showToast('请输入IP', 'error');
  const res = await apiPost('/api/admin/black/ip', { ip });
  showToast(res.code === 200 ? 'IP已拉黑' : '失败', res.code === 200 ? 'success' : 'error');
}

renderPage();
</script>
</body>
</html>
